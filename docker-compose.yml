services:
  postgres:
    image: postgres:18-alpine
    container_name: pagasa_postgres
    environment:
      POSTGRES_USER: pagasa
      POSTGRES_PASSWORD: pagasa
      POSTGRES_DB: pagasa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8
    ports:
      - "6379:6379"

volumes:
  postgres_data: